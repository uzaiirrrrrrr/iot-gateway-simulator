<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" /> <!-- Purple-500 -->
      <stop offset="100%" stop-color="#3b82f6" /> <!-- Blue-500 -->
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef" /> <!-- Fuchsia-500 -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- Cyan-500 -->
    </linearGradient>
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark rounded background for the app icon look -->
  <rect width="512" height="512" rx="128" fill="#090d16" />

  <!-- Outer connecting circle/orbit -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#primary-grad)" stroke-width="8" stroke-dasharray="16 12" opacity="0.6" />

  <!-- Radiating signals/radar arcs -->
  <path d="M 180 200 A 90 90 0 0 1 332 200" fill="none" stroke="url(#glow-grad)" stroke-width="12" stroke-linecap="round" filter="url(#glow-filter)" />
  <path d="M 140 170 A 150 150 0 0 1 372 170" fill="none" stroke="url(#primary-grad)" stroke-width="10" stroke-linecap="round" opacity="0.7" />
  <path d="M 100 140 A 210 210 0 0 1 412 140" fill="none" stroke="url(#primary-grad)" stroke-width="8" stroke-linecap="round" opacity="0.4" />

  <!-- Connecting Node Lines to Peripheral Devices -->
  <line x1="256" y1="280" x2="130" y2="380" stroke="url(#primary-grad)" stroke-width="6" />
  <line x1="256" y1="280" x2="382" y2="380" stroke="url(#primary-grad)" stroke-width="6" />
  <line x1="256" y1="280" x2="256" y2="420" stroke="url(#primary-grad)" stroke-width="6" />

  <!-- Peripheral Nodes -->
  <circle cx="130" cy="380" r="24" fill="#090d16" stroke="#06b6d4" stroke-width="6" filter="url(#glow-filter)" />
  <circle cx="130" cy="380" r="10" fill="#06b6d4" />
  
  <circle cx="382" cy="380" r="24" fill="#090d16" stroke="#06b6d4" stroke-width="6" filter="url(#glow-filter)" />
  <circle cx="382" cy="380" r="10" fill="#06b6d4" />
  
  <circle cx="256" cy="420" r="24" fill="#090d16" stroke="#d946ef" stroke-width="6" filter="url(#glow-filter)" />
  <circle cx="256" cy="420" r="10" fill="#d946ef" />

  <!-- Central Gateway Hub -->
  <circle cx="256" cy="280" r="48" fill="url(#glow-grad)" filter="url(#glow-filter)" />
  <circle cx="256" cy="280" r="20" fill="#ffffff" />
</svg>